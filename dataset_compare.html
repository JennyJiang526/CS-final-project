  <script type="application/json" id="emb">[{"dataset":"MediQA","question":"what are autoimmune blood disorders","answer":"[\"Autoimmune disorders: An autoimmune disorder occurs when the body's immune system attacks and destroys healthy body tissue by mistake. There are more than 80 types of autoimmune disorders. The blood cells in the body's immune system help protect against harmful substances. Examples include bacteria, viruses, toxins, cancer cells, and blood and tissue from outside the body. These substances contain antigens. The immune system produces antibodies against these antigens that enable it to destroy these harmful substances. When you have an autoimmune disorder, your immune system does not distinguish between healthy tissue and antigens. As a result, the body sets off a reaction that destroys normal tissues. The exact cause of autoimmune disorders is unknown. One theory is that some microorganisms (such as bacteria or viruses) or drugs may trigger changes that confuse the immune system. This may happen more often in people who have genes that make them more prone to autoimmune disorders. An autoimmune disorder may result in: - The destruction of body tissue - Abnormal growth of an organ - Changes in organ function An autoimmune disorder may affect one or more organ or tissue types. Areas often affected by autoimmune disorders include: - Blood vessels - Connective tissues - Endocrine glands such as the thyroid or pancreas - Joints - Muscles - Red blood cells - Skin A person may have more than one autoimmune disorder at the same time. Common autoimmune disorders include: - Addison disease - Celiac disease - sprue (gluten-sensitive enteropathy) - Dermatomyositis - Graves disease - Hashimoto thyroiditis - Multiple sclerosis - Myasthenia gravis - Pernicious anemia - Reactive arthritis - Rheumatoid arthritis - Sjögren syndrome - Systemic lupus erythematosus - Type I diabetes Symptoms will vary based on the type and location of the faulty immune response. Common symptoms include: - Fatigue - Fever - General ill-feeling (malaise) - Joint pain - Rash The health care provider will do a physical exam. Signs depend on the type of disease. Tests that may be done to diagnose an autoimmune disorder include: - Antinuclear antibody tests - Autoantibody tests - CBC - Comprehensive metabolic panel - C-reactive protein (CRP) - Erythrocyte sedimentation rate (ESR) - Urinalysis The goals of treatment are to: - Reduce symptoms - Control the autoimmune process - Maintain the body's ability to fight disease Treatments will depend on your disease and symptoms. Types of treatments include: - Supplements to replace a substance that the body lacks, such as thyroid hormone, vitamin B12, or insulin, due to the autoimmune disease - Blood transfusions if blood is affected - Physical therapy to help with movement if the bones, joints, or muscles are affected Many people take medicines to reduce the immune system's abnormal response. These are often called immunosuppressive medicines. Examples include corticosteroids (such as prednisone) and nonsteroid drugs such as azathioprine, cyclophosphamide, mycophenolate, sirolimus, or tacrolimus. Targeted drugs called tumor necrosis factor (TFN) blockers can be used for some diseases. The outcome depends on the disease. Most autoimmune diseases are chronic, but many can be controlled with treatment. Symptoms of autoimmune disorders can come and go. When symptoms get worse, it is called a flare-up. Complications depend on the disease. Medicines used to suppress the immune system can cause severe side effects, such as higher risk of infections. Call your health care provider if you develop symptoms of an autoimmune disorder. There is no known prevention for most autoimmune disorders. Updated by: Laura J. Martin, MD, MPH, ABIM Board Certified in Internal Medicine and Hospice and Palliative Medicine, Atlanta, GA. Also reviewed by David Zieve, MD, MHA, Isla Ogilvie, PhD, and the A.D.A.M. Editorial team.\"\n 'PANDAS: PANDAS is an acronym for Pediatric Autoimmune Neuropsychiatric Disorder\\xa0 Associated with Streptococcus. It is used to describe a condition in children whose symptoms of\\xa0 obsessive-compulsive disorder\\xa0(OCD) or a tic disorder (i.e.\\xa0 Tourette syndrome) are worsened by\\xa0 group A streptococcal (GAS) infections.\\xa0The underlying cause of PANDAS is unclear, but studies suggest that a strep infection causes an abnormal\\xa0 immune response\\xa0resulting in neuropsychiatric symptoms. The association between PANDAS and GAS is controversial because the cause has not been proven. Management is centered on providing antibiotics for GAS infection, and medication or behavioral therapy for neuropsychiatric symptoms. [1] [2] PANDAS is an acronym for Pediatric Autoimmune Neuropsychiatric Disorder Associated with Streptococcus. It describes the abrupt onset or worsening of symptoms in children who have obsessive-compulsive disorder or a tic disorder (i.e. Tourette syndrome), following a group A streptococcal infection (strep infection). Following a strep infection, children affected by PANDAS typically experience a sudden onset of motor or vocal tics; obsessions; and/or compulsions. These severe symptoms typically last from several weeks to several months. After a gradual improvement, children may not experience any additional problems until they contract another strep infection. [3] [4] [5] Children may also experience the following signs and symptoms during a PANDAS episode: [3] [5] Moodiness and irritability Separation anxiety ADHD symptoms Sleep disturbances Night-time bed wetting and/or day-time urinary frequency Fine motor changes (handwriting) Joint pain Concentration difficulties and loss of academic abilities Developmental regression\\xa0(i.e. temper tantrums, \"baby talk\") Although the exact underlying cause of PANDAS has not been proven, studies suggest that it may be an autoimmune disorder. Normally, when a person is exposed to bacteria , the immune system makes proteins called antibodies to fight off the infection. In autoimmune disorders, the body\\'s immune system mistakenly attacks and destroys its own, healthy body tissue . [6]\\xa0PANDAS may occur when a\\xa0 group A streptococcal infection\\xa0(strep infection) triggers an abnormal\\xa0 \\xa0immune response, causing the body to mistakenly\\xa0attack the tissues of the central nervous system (brain and spinal cord). [6]\\xa0However, the role of autoimmunity in PANDAS is controversial. [1] A diagnosis of PANDAS is based on the presence of the following: [4] [6] Obsessive-compulsive disorder or a tic disorder (i.e. Tourette syndrome) Symptoms develop before age 12 Abrupt onset of symptoms and \"episodic\" course (relapses are separated by periods of time in which children have less severe or no symptoms) Association with group A streptococcal infection (in some cases, the affected person has no obvious symptoms of a strep infection; however, a throat culture and/or blood tests\\xa0may show evidence of\\xa0a current or recent\\xa0infection) Association with other neuropsychiatric symptoms (i.e. separation anxiety, ADHD, developmental regression, etc) There are currently no tests available to confirm a diagnosis of PANDAS. The treatment of PANDAS is symptomatic. Children who are diagnosed with a group A streptococcal infection are typically treated with antibiotics whether or not they develop symptoms of PANDAS. Obsessive-compulsive disorders are usually managed with medications (i.e. SSRI medications such as fluoxetine, fluvoxamine, sertaline, or paroxetine) and cognitive behavioral therapy. Tic disorders are often treated with a variety of medications, as well. [4] [5] Some researchers suspect that therapies such as plasmapheresis and/or intravenous immunoglobulin (IVIG), which are often used to treat autoimmune disorders, may be a treatment option for children with PANDAS. Plasmapheresis is a procedure that removes antibodies from the blood. IVIG can sometimes be used to alter the function or production of abnormal\\xa0antibodies. Although some studies have demonstrated that both of these therapies are effective for the treatment of severe, strep triggered OCD and tics, a number of the children in these studies\\xa0experienced severe side-effects. Thus, these treatments are often reserved for severely affected children who do not respond to other therapies. [4] [5] The incidence and prevalence of PANDAS are not known, although it is rare. In one prospective study, only 10 cases were identified among 30,000 throat cultures (1 in 3000) positive for group A streptococci (GAS). Since then, the annual incidence has ranged between 0 per 10,000 cultures to 10 per 30,000 cultures, depending upon the strain of GAS and other factors. Despite its rarity, some researchers suggest that it may account for ≥10% of childhood-onset obsessive-compulsive disorder (OCD) and tic disorders. [1] The following diseases are related to PANDAS. If you have a question about any of these diseases, you can contact GARD. Pediatric acute-onset neuropsychiatric syndrome'\n 'Autoimmune disorders (Outlook (Prognosis)): The outcome depends on the disease. Most autoimmune diseases are chronic, but many can be controlled with treatment. Symptoms of autoimmune disorders can come and go. When symptoms get worse, it is called a flare-up.'\n 'Autoimmune disorders (Prevention): There is no known prevention for most autoimmune disorders.'\n \"Autoimmune disorders (Treatment): The goals of treatment are to: - Reduce symptoms - Control the autoimmune process - Maintain the body's ability to fight disease Treatments will depend on your disease and symptoms. Types of treatments include: - Supplements to replace a substance that the body lacks, such as thyroid hormone, vitamin B12, or insulin, due to the autoimmune disease - Blood transfusions if blood is affected - Physical therapy to help with movement if the bones, joints, or muscles are affected Many people take medicines to reduce the immune system's abnormal response. These are often called immunosuppressive medicines. Examples include corticosteroids (such as prednisone) and nonsteroid drugs such as azathioprine, cyclophosphamide, mycophenolate, sirolimus, or tacrolimus. Targeted drugs called tumor necrosis factor (TFN) blockers can be used for some diseases.\"\n \"Autoimmune hepatitis: Autoimmune hepatitis is liver inflammation that occurs when your body's immune system turns against liver cells. The exact cause of autoimmune hepatitis is unclear, but genetic and environmental factors appear to interact over time in triggering the disease. Untreated autoimmune hepatitis can lead to scarring of the liver (cirrhosis) and eventually to liver failure. When diagnosed and treated early, however, autoimmune hepatitis often can be controlled with drugs that suppress the immune system. A liver transplant may be an option when autoimmune hepatitis doesn't respond to drug treatments or when liver disease is advanced. Signs and symptoms of autoimmune hepatitis can range from minor to severe and may come on suddenly. Some people have few, if any, recognized problems in the early stages of the disease, whereas others experience signs and symptoms that may include: - Fatigue - Abdominal discomfort - Yellowing of the skin and whites of the eyes (jaundice) - An enlarged liver - Abnormal blood vessels on the skin (spider angiomas) - Skin rashes - Joint pains - In women, loss of menstruation Make an appointment with your doctor if you have any signs or symptoms that worry you. Autoimmune hepatitis occurs when the body's immune system, which ordinarily attacks viruses, bacteria and other pathogens, instead targets the liver. This attack on your liver can lead to chronic inflammation and serious damage to liver cells. Just why the body turns against itself is unclear, but researchers think autoimmune hepatitis could be caused by the interaction of genes controlling immune-system function and exposure to particular viruses or drugs. Doctors have identified two main forms of autoimmune hepatitis: - Type 1 autoimmune hepatitis. This is the most common type of the disease. It can occur at any age. About half the people with type 1 autoimmune hepatitis have other autoimmune disorders, such as celiac disease, rheumatoid arthritis or ulcerative colitis. - Type 2 autoimmune hepatitis. Although adults can develop type 2 autoimmune hepatitis, it's most common in children and young people. Other autoimmune diseases may also accompany this type of autoimmune hepatitis. Factors that may increase your risk of autoimmune hepatitis include: - Being female. Although both men and women can develop autoimmune hepatitis, the disease is more common in women. - A history of certain infections. Autoimmune hepatitis may develop after you're infected with the measles, herpes simplex or Epstein-Barr virus. The disease is also linked to hepatitis A, B or C infection. - Heredity. Evidence suggests that a predisposition to autoimmune hepatitis may run in families. - Having an autoimmune disease. People who already have an autoimmune disease, such as celiac disease, rheumatoid arthritis or hyperthyroidism (Graves' disease or Hashimoto's thyroiditis), may be more likely to develop autoimmune hepatitis. Tests and procedures used to diagnose autoimmune hepatitis include: - Blood tests. Testing a sample of your blood for antibodies can distinguish autoimmune hepatitis from viral hepatitis and other disorders with similar symptoms. Antibody tests also help pinpoint the type of autoimmune hepatitis you have. - Liver biopsy. Doctors perform a liver biopsy to confirm the diagnosis and to determine the degree and type of liver damage. During the procedure, a small amount of liver tissue is removed, using a thin needle that's passed into your liver through your skin. The sample is then sent to a laboratory for analysis. Your doctor may use ultrasound to guide the biopsy. Whatever type of autoimmune hepatitis you have, the goal of treatment is to slow or stop the immune system attack on your liver. This may help slow the progression of the disease. To meet this goal, you'll need medications that lower immune-system activity. Treatment with prednisone is generally used initially. A second medication, azathioprine (Azasan, Imuran), may be recommended in addition to prednisone. Prednisone, especially when taken long term, can cause a wide range of serious side effects, including diabetes, thinning bones (osteoporosis), broken bones (osteonecrosis), high blood pressure, cataracts, glaucoma and weight gain. Doctors typically prescribe prednisone at a high dose for about the first month of treatment. Then, to reduce the risk of side effects, they gradually reduce the dose over the next several months until reaching the lowest possible dose that controls the disease. Adding azathioprine also helps you avoid prednisone side effects. Most people need to continue taking the prednisone for at least 18 to 24 months, and many remain on it for life. Although you may experience remission a few years after starting treatment, the disease often returns if the drug is discontinued. Liver transplant When medications don't halt the progress of the disease, or you develop irreversible scarring (cirrhosis) or liver failure, the remaining option is a liver transplant. During a liver transplant, your diseased liver is removed and replaced by a healthy liver from a donor. Liver transplants most often use livers from deceased organ donors. In some cases, a living-donor liver transplant can be used. During a living-donor liver transplant, you receive only a portion of a healthy liver from a living donor. Both livers begin regenerating new cells almost immediately.\"\n \"Autoimmune Hepatitis: The National Institute of Diabetes and Digestive and Kidney Diseases (NIDDK) and other components of the National Institutes of Health (NIH) conduct and support research into many diseases and conditions.What are clinical trials, and are they right for you?Clinical trials are part of clinical research and at the heart of all medical advances. Clinical trials look at new ways to prevent, detect, or treat disease. Researchers also use clinical trials to look at other aspects of care, such as improving the quality of life for people with chronic illnesses. Find out if clinical trials are right for you.Find out if clinical trials are right for youWhat clinical trials are open?Clinical trials that are currently open and are recruiting can be viewed at www.ClinicalTrials.gov.www.ClinicalTrials.govThis information may contain content about medications and, when taken as prescribed, the conditions they treat. When prepared, this content included the most current information available. For updates or for questions about any medications, contact the U.S. Food and Drug Administration toll-free at 1–888–INFO–FDA (1–888–463–6332) or visit www.fda.gov. Consult your health care provider for more information.This information may contain content about medications and, when taken as prescribed, the conditions they treat. When prepared, this content included the most current information available. For updates or for questions about any medications, contact the U.S. Food and Drug Administration toll-free at 1–888–INFO–FDA (1–888–463–6332) or visit www.fda.gov. Consult your health care provider for more information.www.fda.govThe U.S. Government does not endorse or favor any specific commercial product or company. Trade, proprietary, or company names appearing in this document are used only because they are considered necessary in the context of the information provided. If a product is not mentioned, the omission does not mean or imply that the product is unsatisfactory.The U.S. Government does not endorse or favor any specific commercial product or company. Trade, proprietary, or company names appearing in this document are used only because they are considered necessary in the context of the information provided. If a product is not mentioned, the omission does not mean or imply that the product is unsatisfactory.What is autoimmune hepatitis? Autoimmune hepatitis is a chronic—or long lasting—disease in which the body's immune system attacks the normal components, or cells, of the liver and causes inflammation and liver damage. The immune system normally protects people from infection by identifying and destroying bacteria, viruses, and other potentially harmful foreign substances. Autoimmune hepatitis is a serious condition that may worsen over time if not treated. Autoimmune hepatitis can lead to cirrhosis and liver failure. Cirrhosis occurs when scar tissue replaces healthy liver tissue and blocks the normal flow of blood through the liver. Liver failure occurs when the liver stops working properly. What are autoimmune diseases? Autoimmune diseases are disorders in which the body's immune system attacks the body's own cells and organs with proteins called autoantibodies; this process is called autoimmunity. Autoimmune hepatitis is a chronic disease of the liver. The body's immune system normally makes large numbers of proteins called antibodies to help the body fight off infections. In some cases, however, the body makes autoantibodies. Certain environmental triggers can lead to autoimmunity. Environmental triggers are things originating outside the body, such as bacteria, viruses, toxins, and medications. What causes autoimmune hepatitis? A combination of autoimmunity, environmental triggers, and a genetic predisposition can lead to autoimmune hepatitis. Who is more likely to develop autoimmune hepatitis? Autoimmune hepatitis is more common in females.1 The disease can occur at any age and affects all ethnic groups. What are the types of autoimmune hepatitis? Autoimmune hepatitis is classified into several types. Type 1 autoimmune hepatitis is the most common form in North America. Type 1 can occur at any age; however, it most often starts in adolescence or young adulthood. About 70 percent of people with type 1 autoimmune hepatitis are female.1 People with type 1 autoimmune hepatitis commonly have other autoimmune disorders, such as celiac disease, an autoimmune disease in which people cannot tolerate gluten because it damages the lining of their small intestine and prevents absorption of nutrients Crohn's disease, which causes inflammation and irritation of any part of the digestive tract Graves' disease, the most common cause of hyperthyroidism in the United States Hashimoto's disease, also called chronic lymphocytic thyroiditis or autoimmune thyroiditis, a form of chronic inflammation of the thyroid gland proliferative glomerulonephritis, or inflammation of the glomeruli, which are tiny clusters of looping blood vessels in the kidneys primary sclerosing cholangitis, which causes irritation, scarring, and narrowing of the bile ducts inside and outside the liver rheumatoid arthritis, which causes pain, swelling, stiffness, and loss of function in the joints Sjögren's syndrome, which causes dryness in the mouth and eyes systemic lupus erythematosus, which causes kidney inflammation called lupus nephritis type 1 diabetes, a condition characterized by high blood glucose, also called blood sugar, levels caused by a total lack of insulin ulcerative colitis, a chronic disease that causes inflammation and sores, called ulcers, in the inner lining of the large intestine Type 2 autoimmune hepatitis is less common and occurs more often in children than adults.1 People with type 2 can also have any of the above autoimmune disorders. What are the symptoms of autoimmune hepatitis? The most common symptoms of autoimmune hepatitis are fatigue joint pain nausea loss of appetite pain or discomfort over the liver skin rashes dark yellow urine light-colored stools jaundice, or yellowing of the skin and whites of the eyes Symptoms of autoimmune hepatitis range from mild to severe. Some people may feel as if they have a mild case of the flu. Others may have no symptoms when a health care provider diagnoses the disease; however, they can develop symptoms later. How is autoimmune hepatitis diagnosed? A health care provider will make a diagnosis of autoimmune hepatitis based on symptoms, a physical exam, blood tests, and a liver biopsy. A health care provider performs a physical exam and reviews the person's health history, including the use of alcohol and medications that can harm the liver. A person usually needs blood tests for an exact diagnosis because a person with autoimmune hepatitis can have the same symptoms as those of other liver diseases or metabolic disorders. Blood tests. A blood test involves drawing blood at a health care provider's office or a commercial facility and sending the sample to a lab for analysis. A person will need blood tests for autoantibodies to help distinguish autoimmune hepatitis from other liver diseases that have similar symptoms, such as viral hepatitis, primary biliary cirrhosis, steatohepatitis, or Wilson disease. Liver biopsy. A liver biopsy is a procedure that involves taking a piece of liver tissue for examination with a microscope for signs of damage or disease. The health care provider may ask the patient to temporarily stop taking certain medications before the liver biopsy. He or she may also ask the patient to fast for 8 hours before the procedure. During the procedure, the patient lies on a table, right hand resting above the head. A health care provider will apply a local anesthetic to the area where he or she will insert the biopsy needle. If needed, he or she will give sedatives and pain medication. Then, he or she will use a needle to take a small piece of liver tissue, and may use ultrasound, computerized tomography scans, or other imaging techniques to guide the needle. After the biopsy, the patient must lie on the right side for up to 2 hours and is monitored an additional 2 to 4 hours before being sent home. A health care provider performs a liver biopsy at a hospital or an outpatient center. The liver sample is sent to a pathology lab where the pathologist—a doctor who specializes in diagnosing disease—looks at the tissue with a microscope and sends a report to the patient's health care provider. A health care provider can use liver biopsy to diagnose autoimmune hepatitis and determine if cirrhosis is present. People often have cirrhosis at the time they are diagnosed with autoimmune hepatitis. A health care provider can also use liver biopsy to look for changes in the severity of liver damage prior to ending treatment for autoimmune hepatitis. How is autoimmune hepatitis treated? Treatment for autoimmune hepatitis includes medication to suppress, or slow down, an overactive immune system. Treatment may also include a liver transplant. Treatment works best when autoimmune hepatitis is diagnosed early. People with autoimmune hepatitis generally respond to standard treatment and the disease can be controlled in most cases. Long-term response to treatment can stop the disease from getting worse and may even reverse some damage to the liver. Medications People with autoimmune hepatitis who have no symptoms or a mild form of the disease may or may not need to take medication. A health care provider will determine if a person needs treatment. In some people with mild autoimmune hepatitis, the disease may go into remission. Remission is a period when a person is symptom-free and blood tests and liver biopsy show improvement in liver function. Corticosteroids. Corticosteroids are medications that decrease swelling and reduce the activity of the immune system. Health care providers treat both types of autoimmune hepatitis with a daily dose of a corticosteroid called prednisone. Treatment may begin with a high dose that is gradually lowered as the disease is controlled. The treatment goal is to find the lowest possible dose that helps control the disease. Side effects of prednisone may include weight gain weakness of the bones, called osteoporosis or osteomalacia thinning of the hair and skin acne diabetes high blood pressure cataracts, a clouding in the lens of the eyes glaucoma, elevated pressure in the eyes anxiety and confusion A health care provider will closely monitor and manage any side effects that may occur, as high doses of prednisone are often prescribed to treat autoimmune hepatitis. Immune system suppressors. Medications that suppress the immune system prevent the body from making autoantibodies and block the immune reaction that contributes to inflammation. In most cases, health care providers use azathioprine (Azasan, Imuran) in conjunction with prednisone to treat autoimmune hepatitis. When using azathioprine, a health care provider can use a lower dose of prednisone, which may reduce prednisone's side effects. Side effects of azathioprine include low white blood cell count nausea vomiting skin rash liver damage pancreatitis, or inflammation of the pancreas Azathioprine is an immune system suppressor, so people taking the medication should undergo routine blood tests to monitor their white blood cell counts. A low white blood cell count can lead to bone marrow failure. Bone marrow is the tissue found inside bones that produces new blood cells, including platelets. A health care provider will also check the platelet count when blood tests are done. A person may need to discontinue prednisone or azathioprine if they cause severe side effects. The risk of side effects is higher in people who also have cirrhosis. A health care provider may gradually reduce the dose of medication in people who show improvement, although the symptoms can return. When a person discontinues treatment, a health care provider will perform routine blood tests and carefully monitor the person's condition for a return of symptoms. Treatment with low doses of prednisone or azathioprine may be necessary on and off for many years. People who do not respond to standard immune therapy or who have severe side effects from the medications may benefit from other immunosuppressive agents such as mycophenolate mofetil (CellCept), cyclosporine, or tacrolimus (Hecoria, Prograf). Medications that suppress the immune system may lead to various forms of cancer. People on low doses of azathioprine for long periods of time are at slight risk of developing cancer. Liver Transplant In some people, autoimmune hepatitis progresses to cirrhosis and end-stage liver failure, and a liver transplant may be necessary. Symptoms of cirrhosis and liver failure include the symptoms of autoimmune hepatitis and generalized itching a longer-than-usual amount of time for bleeding to stop easy bruising a swollen stomach or swollen ankles spiderlike blood vessels, called spider angiomas, that develop on the skin abdominal bloating due to an enlarged liver fluid in the abdomen—also called ascites forgetfulness or confusion Liver transplant is surgery to remove a diseased or an injured liver and replace it with a healthy one from another person, called a donor. A team of surgeons performs a liver transplant in a hospital. When possible, the patient fasts for 8 hours before the surgery. The patient stays in the hospital about 1 to 2 weeks to be sure the transplanted liver is functioning properly. The health care provider will monitor the patient for bleeding, infections, and signs of liver rejection. The patient will take prescription medications long term to prevent infections and rejection. Liver transplant surgery for autoimmune hepatitis is successful in most cases. More information is provided in the NIDDK health topic, Liver Transplantation. What is a possible complication of autoimmune hepatitis and cirrhosis? People with autoimmune hepatitis and cirrhosis are at risk of developing liver cancer. A health care provider will monitor the person with a regular ultrasound examination of the liver. Ultrasound uses a device, called a transducer, that bounces safe, painless sound waves off organs to create an image of their structure. A specially trained technician performs the procedure in a health care provider's office, an outpatient center, or a hospital, and a radiologist—a doctor who specializes in medical imaging—interprets the images; anesthesia is not needed. The images can show the liver's size and the presence of cancerous tumors. Eating, Diet, and Nutrition Researchers have not found that eating, diet, and nutrition play a role in causing or preventing autoimmune hepatitis. Points to Remember Autoimmune hepatitis is a chronic—or long lasting—disease in which the body's immune system attacks the liver and causes inflammation and damage. Autoimmune hepatitis is a serious condition that may worsen over time if not treated. Autoimmune hepatitis can lead to cirrhosis and liver failure. Autoimmune hepatitis is more common in females. The disease can occur at any age and affects all ethnic groups. Autoimmune hepatitis is classified as type 1 or type 2. A health care provider will make a diagnosis of autoimmune hepatitis based on symptoms, a physical exam, blood tests, and a liver biopsy. A person usually needs blood tests for an exact diagnosis because a person with autoimmune hepatitis can have the same symptoms as those of other liver diseases or metabolic disorders. Treatment for autoimmune hepatitis includes medication to suppress, or slow down, an overactive immune system. Treatment works best when autoimmune hepatitis is diagnosed early. People with autoimmune hepatitis generally respond to standard treatment and the disease can be controlled in most cases. In some people, autoimmune hepatitis progresses to cirrhosis and end-stage liver failure, and a liver transplant may be necessary. References [1] Manns MP, Czaja AJ, Gorham JD, et al. Diagnosis and management of autoimmune hepatitis. Hepatology. 2010;51(6):1–31. Clinical Trials The National Institute of Diabetes and Digestive and Kidney Diseases (NIDDK) and other components of the National Institutes of Health (NIH) conduct and support research into many diseases and conditions. What are clinical trials, and are they right for you? Clinical trials are part of clinical research and at the heart of all medical advances. Clinical trials look at new ways to prevent, detect, or treat disease. Researchers also use clinical trials to look at other aspects of care, such as improving the quality of life for people with chronic illnesses. Find out if clinical trials are right for you. What clinical trials are open? Clinical trials that are currently open and are recruiting can be viewed at www.ClinicalTrials.gov. This information may contain content about medications and, when taken as prescribed, the conditions they treat. When prepared, this content included the most current information available. For updates or for questions about any medications, contact the U.S. Food and Drug Administration toll-free at 1–888–INFO–FDA (1–888–463–6332) or visit www.fda.gov. Consult your health care provider for more information. The U.S. Government does not endorse or favor any specific commercial product or company. Trade, proprietary, or company names appearing in this document are used only because they are considered necessary in the context of the information provided. If a product is not mentioned, the omission does not mean or imply that the product is unsatisfactory.\"]","context":""},{"dataset":"BioASQ","question":"The small molecule SEA0400 is an inhibitor of which ion antiporter/exchanger?","answer":"NCX","context":"The Na+/Ca2+ exchanger-mediated Ca2+ influx triggers nitric oxide-induced cytotoxicity in cultured astrocytes. Nitric oxide (NO) is involved in many pathological conditions including neurodegenerative disorders. We have previously found that sodium nitroprusside (SNP), an NO donor, stimulates mitogen-activated protein kinases (MAPKs) such as extracellular signal-regulating kinase (ERK), c-jun N-terminal protein kinase (JNK) and p38 MAPK, leading to caspase-independent apoptosis in cultured astrocytes. In view of the previous observation that NO stimulates the activity of the Na(+)/Ca(2+) exchanger (NCX), this study examines the involvement of NCX in cytotoxicity. The specific NCX inhibitor SEA0400 blocked SNP-induced phosphorylation of ERK, JNK and p38 MAPK, and decrease in cell viability. SNP-induced phosphorylation of ERK, JNK and p38 MAPK was blocked by removal of external Ca(2+), and SNP treatment caused an increase in (45)Ca(2+) influx. This increase in (45)Ca(2+) influx was blocked by SEA0400, but not the Ca(2+) channel blocker nifedipine. In addition, SNP-induced (45)Ca(2+) influx and cytotoxicity were reduced in NCX1-deficient cells which were transfected with NCX1 siRNA. Inhibitors of intracellular Ca(2+)-dependent proteins such as calpain and calmodulin blocked SNP-induced ERK phosphorylation and decrease in cell viability. Furthermore, the guanylate cyclase inhibitor LY83583 and the cGMP-dependent protein kinase inhibitor KT5823 blocked SNP-induced cytotoxicity. These findings suggest that NCX-mediated Ca(2+) influx triggers SNP-induced apoptosis in astrocytes, which may be mediated by a cGMP-dependent pathway."},{"dataset":"MedQA-US","question":"\u003cquestion> A 25-year-old man is brought into the hospital by his family because they are concerned that he has post-traumatic stress disorder. The patient is a marine and was deployed to Afghanistan 2 years ago. He was able to successfully reintegrate with society upon his return; however, for the last 2 weeks, he has been having recurrent nightmares and avoiding news coverage on the war. He has become more and more detached from his family and friends and, on the few times he does interact with them, he has angry outbursts. The patient is afebrile, and his vital signs are within normal limits. Physical examination is unremarkable. Which of the following findings is most important in correctly diagnosing this patient’s condition?\n\u003coptions>\nA. Duration of symptoms\nB. Flashbacks\nC. State of hyperarousal\nD. Avoidance of triggers\nE. Negative Mood","answer":"A","context":""},{"dataset":"PubMedQA","question":"Is a specialised training of phonological awareness indicated in every preschool child?","answer":"\u003clong_answer> A specialized training program to improve phonologic awareness as a basis for reading and writing in every kindergarten and preschool child seems to be unnecessary. However, children with temporary hearing deficits benefit from such a program. For all other children general perception training may be sufficient.\n\u003cfinal_decision> maybe","context":"In a prospective study 218 preschool children were enrolled (stratified in 2 training programs, one specialized for phonologic awareness in order to prevent dyslexia, the other consisting in training of general perception) during the last year of kindergarten. After finishing the first grade 131 children were compared in their reading and writing abilities. In the whole group only a slight difference was found between both training modalities concerning their writing abilities. However, children with a history of hearing loss, actual hearing loss or pathologic middle ear findings profited most from the specialized training program compared to the control in their reading abilities."}]</script>
